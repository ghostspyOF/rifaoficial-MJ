    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
                /* Ajuste do Body para receber o topo fixo */
        body {
            flex-direction: column;
            justify-content: flex-start !important;
            padding: 0 !important;
        }

        /* Topo Azul do Prêmio Fácil */
        .header-top {
            width: 100%;
            background-color: #0d47a1;
            background: linear-gradient(180deg, #0f4c81 0%, #0a3366 100%);
            border-bottom: 4px solid #d4af37;

            border-bottom-right-radius: 24px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* Caixa do Logo simulada */
        .logo-box {
            background: white;
            padding: 6px 12px;
            border-radius: 0 15px 15px 15px;
            font-weight: 900;
            font-size: 14px;
            line-height: 1.1;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .logo-box div:first-child { color: #28a745; }
        .logo-box div:last-child { color: #ffc107; font-size: 16px; text-shadow: 1px 1px 1px #000; }
        
        .header-center {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header-center svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        
        /* Menu de 3 Palitos */
        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }
        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: #28a745;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Modal/Menu Lateral Escondido */
        .menu-modal {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: -4px 0 15px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: right 0.3s ease-in-out;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-modal.active {
            right: 0;
        }
        .menu-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 15px;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }
        .close-menu {
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        /* Links dos botões dentro do Modal */
        .menu-modal a {
            display: block;
            text-decoration: none;
            background-color: #f8f9fa;
            color: #333;
            padding: 14px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            border-left: 4px solid #0f4c81;
            transition: 0.2s;
        }
        .menu-modal a:hover {
            background-color: #e9ecef;
            transform: translateX(5px);
        }

        /* Overlay escuro de fundo quando o menu abre */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
        }
        .menu-overlay.active {
            display: block;
        }

        /* Margem para desgrudar o container do topo */
        .container {
            margin: 30px auto;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-generate {
            background-color: #007bff;
            color: white;
        }
        .btn-generate:hover {
            background-color: #0056b3;
        }
        .btn-confirm {
            background-color: #28a745;
            color: white;
            display: none;
        }
        .btn-confirm:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 20px;
            background: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .cota-tag {
            display: inline-block;
            background: #343a40;
            color: #fff;
            padding: 5px 10px;
            margin: 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-bottom: 10px;
        }
            .fast-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-fast {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #495057;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .btn-fast:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }
        .btn-fast span {
            font-size: 12px;
            color: #28a745;
            font-weight: bold;
        }

    </style>
</head>

<div class="container">

    <h2>Gerador de Cotas</h2>
    <div id="loading" class="loading">Carregando números já existentes...</div>
    
    <div class="fast-buttons">
        <button type="button" class="btn-fast" onclick="selecionarRapido(10)">10 Cotas <span>R$ 5,00</span></button>
        <button type="button" class="btn-fast" onclick="selecionarRapido(20)">20 Cotas <span>R$ 10,00</span></button>
        <button type="button" class="btn-fast" onclick="selecionarRapido(30)">30 Cotas <span>R$ 15,00</span></button>
        <button type="button" class="btn-fast" onclick="selecionarRapido(40)">40 Cotas <span>R$ 20,00</span></button>
        <button type="button" class="btn-fast" style="grid-column: span 2;" onclick="selecionarRapido(50)">50 Cotas <span>R$ 25,00</span></button>
    </div>
    
    <div class="form-group">
        <label for="nome">Nome do Participante:</label>
        <input type="text" id="nome" placeholder="Digite o nome completo">
    </div>
    <div class="form-group">
        <label for="whatsapp">WhatsApp (com DDD):</label>
        <input type="tel" id="whatsapp" placeholder="Ex: 11999999999">
    </div>
        <div class="form-group">
        <label for="qtd">Quantidade de Cotas (Mín 10 / Máx 50):</label>
        <input type="number" id="qtd" min="10" max="50" value="10">
    </div>

    <button id="btnGenerate" class="btn-generate" onclick="gerarCotas()" disabled>Gerar Cotas</button>

    <div id="results" class="results">
        <h3>Suas Cotas:</h3>
        <div id="listaCotas"></div>
        <button id="btnConfirm" class="btn-confirm" onclick="confirmarEEnviar()">Confirmar e Finalizar</button>
    </div>
</div>

<script>
    // Configurações das URLs
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtZQeMAZAdMxxvTLz7YTYylYbu2tSwwANB1Braq_vyrs3_ersG3r1R7qxfdMxfG3YbJzl0Vgakfm1o/pub?output=csv";
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzfGwB7xe1k7T-qivwnmi3fAz_QUBgNrcRItnVX-EXz-_OmvDVgwWJYH9Eeo2buFy_4Pw/exec";

    let numerosIndisponiveis = new Set();
    let cotasGeradas = [];

    // Carregar números existentes do CSV ao iniciar o site
    async function carregarNumerosExistentes() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const linhas = data.split("\n");

            // Começa da linha 1 (ignora cabeçalho se houver)
            for(let i = 1; i < linhas.length; i++) {
                let colunas = linhas[i].split(",");
                
                // Colunas B (índice 1) até Z (índice 25)
                    for(let j = 1; j <= 25; j++) {
                    if(colunas[j]) {
                        let num = colunas[j].trim();
                        if(num) numerosIndisponiveis.add(num);
                    }
                }
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('btnGenerate').disabled = false;
        } catch (error) {
            document.getElementById('loading').innerText = "Erro ao carregar dados da planilha. Recarregue a página.";
            console.error("Erro ao carregar CSV:", error);
        }
    }

    // Função para gerar número aleatório de 7 dígitos que não exista no Set
    function gerarNumeroSeteDigitos() {
        let numero;
        do {
            numero = Math.floor(1000000 + Math.random() * 9000000).toString();
        } while (numerosIndisponiveis.has(numero));
        return numero;
    }

    function gerarCotas() {
        const nome = document.getElementById('nome').value.trim();
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const qtd = parseInt(document.getElementById('qtd').value);

        if (!nome || !whatsapp) {
            alert("Por favor, preencha o Nome e o WhatsApp.");
            return;
        }
        if (qtd < 10 || qtd > 50) {
            alert("Você pode gerar de 10 a 50 cotas por vez.");
            return;
        }

        cotasGeradas = [];
        const listaDiv = document.getElementById('listaCotas');
        listaDiv.innerHTML = '';

        for (let i = 0; i < qtd; i++) {
            let novaCota = gerarNumeroSeteDigitos();
            cotasGeradas.push(novaCota);
            
            // Adiciona visualmente na tela
            let span = document.createElement('span');
            span.className = 'cota-tag';
            span.innerText = novaCota;
            listaDiv.appendChild(span);
        }

        document.getElementById('results').style.display = 'block';
        document.getElementById('btnConfirm').style.display = 'block';
    }

    async function confirmarEEnviar() {
        const nome = document.getElementById('nome').value.trim();
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const btnConfirm = document.getElementById('btnConfirm');

        btnConfirm.innerText = "Enviando...";
        btnConfirm.disabled = true;

        const payload = {
    nome: nome,
    whatsapp: whatsapp, // Enviando o whatsapp separado para o script juntar na coluna A
    cotas: cotasGeradas
};


        try {
            // Envia os dados para o Google Apps Script
            const response = await fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors", // Necessário para evitar erros de CORS com o Google Apps Script
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            // Como usamos 'no-cors', não conseguimos ler a resposta diretamente, 
            // mas se não cair no 'catch', o envio foi disparado com sucesso.
            
            // Prepara a mensagem do WhatsApp
            const textoMensagem = `Olá ${nome}! Suas cotas foram geradas com sucesso.\n\n*Cotas:* \n${cotasGeradas.join('\n')}`;
            const urlWhatsapp = `https://api.whatsapp.com/send?phone=${whatsapp}&text=${encodeURIComponent(textoMensagem)}`;
            
            // Redireciona para o WhatsApp
            window.location.href = urlWhatsapp;

        } catch (error) {
            alert("Ocorreu um erro ao salvar as informações. Tente novamente.");
            console.error(error);
            btnConfirm.innerText = "Confirmar e Finalizar";
            btnConfirm.disabled = false;
        }
    }

    // Inicializa carregando os dados do CSV
        // Função para preencher automaticamente a quantidade ao clicar no botão rápido
    function selecionarRapido(quantidade) {
        document.getElementById('qtd').value = quantidade;
    }
    carregarNumerosExistentes();
    
        // Função para abrir e fechar o menu modal lateral
    function toggleMenu(open) {
        const modal = document.getElementById('menuModal');
        const overlay = document.getElementById('menuOverlay');
        
        if (open) {
            modal.classList.add('active');
            overlay.classList.add('active');
        } else {
            modal.classList.remove('active');
            overlay.classList.remove('active');
        }
    }

</script>
